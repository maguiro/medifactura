<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediFactura</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--bg:#1e2228;--sur:#262c35;--sur2:#2d3440;--bor:#3a4453;--tx:#d4dbe6;--tx2:#8892a0;--tx3:#555e6b;--ac:#00d4aa;--acl:#0d2e27;--acd:#00b894;--gr:#00d4aa;--grl:#0d2e27;--am:#f0b429;--aml:#2b2100;--re:#f85149;--rel:#2e1010;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;height:100vh;overflow:hidden;display:flex}
aside{width:220px;background:var(--sur);border-right:1px solid var(--bor);display:flex;flex-direction:column;flex-shrink:0;height:100vh}
#MC{flex:1;overflow-y:auto;height:100vh}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--bor)}
.logo-t{font-size:16px;font-weight:600;letter-spacing:-.3px}
.logo-s{font-size:11px;color:var(--tx3);font-family:'DM Mono',monospace;margin-top:1px}
nav{flex:1;padding:10px 8px}
.ns{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;padding:14px 10px 6px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--tx2);font-size:13.5px;transition:all .15s;margin-bottom:1px;user-select:none}
.ni:hover{background:var(--bg);color:var(--tx)}
.ni.on{background:var(--acl);color:var(--ac);font-weight:500}
.ni svg{width:16px;height:16px;flex-shrink:0}
.nb{margin-left:auto;background:var(--ac);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;font-family:'DM Mono',monospace}
.hdr{padding:20px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px}
.htit{font-size:20px;font-weight:600;letter-spacing:-.3px}
.hsub{font-size:13px;color:var(--tx3);margin-top:2px}
.hact{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.cnt{padding:20px 28px 40px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s}
.bp{background:var(--ac);color:#fff}.bp:hover{background:var(--acd)}
.bs{background:var(--sur);color:var(--tx);border:1px solid var(--bor)}.bs:hover{background:var(--bg)}
.bg{background:transparent;color:var(--tx2);padding:6px 10px}.bg:hover{background:var(--bg);color:var(--tx)}
.bd{background:var(--rel);color:var(--re);border:1px solid #fecaca}.bd:hover{background:#fecaca}
.sm{padding:5px 10px;font-size:12px}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.scard{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);padding:18px 20px}
.slbl{font-size:11.5px;color:var(--tx3);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.sval{font-size:26px;font-weight:600;letter-spacing:-.5px;margin-top:4px;font-family:'DM Mono',monospace}
.ssub{font-size:12px;color:var(--tx3);margin-top:3px}
.tw{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);overflow:hidden}
.tw+.tw{margin-top:16px}
.th2{padding:14px 18px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.th2 h3{font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;padding:9px 14px;text-align:left;background:var(--sur2);border-bottom:1px solid var(--bor)}
td{padding:10px 14px;border-bottom:1px solid var(--bor);font-size:13.5px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--sur2)}
.tda{display:flex;gap:4px;justify-content:flex-end}
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.bgr{background:var(--grl);color:var(--gr)}.bbl{background:var(--acl);color:var(--ac)}.bgy{background:var(--bg);color:var(--tx2)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:100;align-items:center;justify-content:center}
.ov.open{display:flex}
.mo{background:var(--sur);border-radius:14px;padding:24px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.mow{max-width:700px}.moxl{max-width:860px}
.mo h2{font-size:16px;font-weight:600;margin-bottom:18px;letter-spacing:-.2px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 11px;border:1px solid var(--bor);border-radius:7px;font-size:13.5px;font-family:'DM Sans',sans-serif;background:var(--sur);color:var(--tx);outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--ac)}
.fg textarea{resize:vertical;min-height:70px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--bor)}
.flt{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.fsel{padding:6px 10px;border:1px solid var(--bor);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--sur);color:var(--tx);cursor:pointer;outline:none}
.emp{padding:48px 20px;text-align:center;color:var(--tx3)}.emp-i{font-size:32px;margin-bottom:10px}
.TC{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.tst{background:var(--tx);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;animation:ti .2s ease}
.tok{background:var(--gr)}.ter{background:var(--re)}
@keyframes ti{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.stit{font-size:12px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;margin-top:18px}
.div{height:1px;background:var(--bor);margin:18px 0}
.mnav{display:flex;align-items:center;gap:8px;background:var(--sur);border:1px solid var(--bor);border-radius:8px;padding:4px 10px}
.mnav span{font-size:13.5px;font-weight:500;min-width:120px;text-align:center}
.alrt{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:14px}
.aam{background:var(--aml);color:var(--am);border:1px solid #fde68a}
.mono{font-family:'DM Mono',monospace}
.csec{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);padding:22px;margin-bottom:16px}
.csec h3{font-size:14px;font-weight:600;margin-bottom:16px}
.rw{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);overflow:hidden}
.rt{padding:14px 20px;border-bottom:1px solid var(--bor);background:var(--sur2);display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.rf label{display:block;font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:4px}
.rf select,.rf input[type=date]{padding:7px 10px;border:1px solid var(--bor);border-radius:7px;font-size:13.5px;font-family:'DM Sans',sans-serif;background:var(--sur);color:var(--tx);outline:none}
.qi{width:80px;padding:6px 8px;border:1px solid var(--bor);border-radius:6px;font-size:14px;font-family:'DM Mono',monospace;text-align:center;background:var(--sur);color:var(--tx);outline:none;transition:border-color .15s}
.qi:focus{border-color:var(--ac);background:var(--acl)}
.rtot{font-family:'DM Mono',monospace;font-size:13px;color:var(--tx2);text-align:right;min-width:80px}
.rb{padding:14px 20px;border-top:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;background:var(--sur2)}
.le{display:grid;grid-template-columns:1fr 66px 86px 76px 28px;gap:6px;align-items:center;margin-bottom:6px}
.le input{padding:5px 8px;border:1px solid var(--bor);border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--sur);color:var(--tx);outline:none}
.le input:focus{border-color:var(--ac)}
.let{font-family:'DM Mono',monospace;font-size:12px;color:var(--tx2);text-align:right}
.led{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px;line-height:1;padding:0 3px;border-radius:4px}
.led:hover{background:var(--rel);color:var(--re)}
.leh{display:grid;grid-template-columns:1fr 66px 86px 76px 28px;gap:6px;margin-bottom:5px}
.leh span{font-size:10.5px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em}
.dcard{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.dcard-hdr{padding:12px 16px;background:var(--sur2);border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
</style>
</head>

// HELPERS
function M(n){ return Number(n).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function Dt(s){ if(!s) return ''; var p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function ML(m){ if(!m) return ''; var p=m.split('-'); return ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(p[1])-1]+' '+p[0]; }
function AM(m,n){ var d=new Date(m+'-01'); d.setMonth(d.getMonth()+n); return d.toISOString().slice(0,7); }
function CM(){ return new Date().toISOString().slice(0,7); }
function NC(id){ var c=DB.arr('clientes').find(function(x){return x.id===id;}); return c?c.nombre:''; }
function NS(id){ var s=DB.arr('sucursales').find(function(x){return x.id===id;}); return s?s.nombre:''; }
function NA(id){ var a=DB.arr('actos').find(function(x){return x.id===id;}); return a?a.nombre:''; }
function PA(id){ var a=DB.arr('actos').find(function(x){return x.id===id;}); return a?a.precio:0; }
function BEST(e){ var m={borrador:'bgy',emitida:'bbl',pagada:'bgr'}; var l={borrador:'Borrador',emitida:'Emitida',pagada:'Pagada'}; return '<span class="bdg '+(m[e]||'bgy')+'">'+(l[e]||e)+'</span>'; }
function NSEQ(){ var cfg=DB.get('cfg')||{}; var s=(DB.get('seq')||0)+1; DB.set('seq',s); return (cfg.pref||'FAC')+'-'+new Date().getFullYear()+'-'+('000'+s).slice(-4); }
function getIVA(cfg){ return (cfg&&cfg.iva!=null)?cfg.iva:0; }

function sortedActos(){ return DB.arr('actos').slice().sort(function(a,b){ return (a.orden||99)-(b.orden||99); }); }
// Calculate total for a day block
function diaTotal(dia){
  if(!dia) return 0;
  // New format: dia.actos = {a1:3, a2:2}
  if(dia.actos && typeof dia.actos === 'object') {
    var t=0;
    Object.keys(dia.actos).forEach(function(aid){ t+=(dia.actos[aid]||0)*PA(aid); });
    return t;
  }
  // Fallback: old format had total stored
  return dia.total||0;
}

function _facGen(cid, mes, agrup){
  var dias=DB.arr('dias').filter(function(d){return d.fecha.startsWith(mes)&&d.cliente===cid;});
  if(agrup!=='todas') dias=dias.filter(function(d){return d.sucursal===agrup;});
  if(!dias.length){ toast('Sin actividad para este período y configuración','ter'); return; }
  // Aggregate by acto (total across all days/sucursales)
  var actoTotals={};
  dias.forEach(function(d){
    Object.keys(d.actos||{}).forEach(function(aid){
      actoTotals[aid]=(actoTotals[aid]||0)+(d.actos[aid]||0);
    });
  });
  // Get sucursal info for the line
  var sucIds=Array.from(new Set(dias.map(function(d){return d.sucursal;})));
  var sucLabel=sucIds.map(NS).join(' / ');
  var lineas=sortedActos().filter(function(a){return actoTotals[a.id]>0;}).map(function(a){
    return {desc:a.nombre, suc:sucLabel, uds:actoTotals[a.id], precio:a.precio, total:actoTotals[a.id]*a.precio};
  });
  var sub=lineas.reduce(function(s,l){return s+l.total;},0);
  var cfg=DB.get('cfg')||{};
  var ivap=getIVA(cfg);
  var ivai=sub*ivap/100;
  var sucPrimary=agrup==='todas'?(sucIds[0]||''):agrup;
  var femision=lastDay(mes);
  var f={id:uid(),num:NSEQ(),cliente:cid,suc:sucPrimary,mes:mes,femision:femision,fvenc:'',estado:'borrador',sub:sub,ivap:ivap,ivai:ivai,total:sub+ivai,lineas:lineas,obs:''};
  DB.save('facturas',DB.arr('facturas').concat([f]));
  toast('Factura creada: '+f.num,'tok'); go('facturas'); badge();
}

function expGetDias(){
  var m1=document.getElementById('exm1')&&document.getElementById('exm1').value;
  var m2=document.getElementById('exm2')&&document.getElementById('exm2').value;
  var suc=document.getElementById('exsuc')&&document.getElementById('exsuc').value;
  var cli=document.getElementById('excli')&&document.getElementById('excli').value;
  var act=document.getElementById('exact')&&document.getElementById('exact').value;
  var dias=DB.arr('dias').filter(function(d){
    if(m1&&d.fecha.slice(0,7)<m1) return false;
    if(m2&&d.fecha.slice(0,7)>m2) return false;
    if(suc&&d.sucursal!==suc) return false;
    if(cli&&d.cliente!==cli) return false;
    if(act&&!(d.actos&&d.actos[act]>0)) return false;
    return true;
  });
  return dias;
}

function expDo(tipo){
  var dias=expGetDias();
  if(!dias.length){ toast('Sin datos para los filtros seleccionados','ter'); return; }
  var act=document.getElementById('exact')&&document.getElementById('exact').value;
  // Build rows
  var rows=[];
  dias.sort(function(a,b){return a.fecha.localeCompare(b.fecha);});
  dias.forEach(function(d){
    sortedActos().forEach(function(a){
      if(act&&a.id!==act) return;
      var q=d.actos[a.id]||0;
      if(q>0) rows.push([Dt(d.fecha),NS(d.sucursal),NC(d.cliente),a.nombre,q,a.precio,q*a.precio,d.obs||'']);
    });
  });
  var headers=['Fecha','Sucursal','Cliente','Acto médico','Cantidad','Precio €','Total €','Notas'];
  if(tipo==='csv'){
    var csv=[headers.join(';')].concat(rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(';');})).join('\n');
    dlBlob(csv,'text/csv;charset=utf-8','\uFEFF'+'Actividad.csv');
    toast('CSV descargado ✓','tok');
  } else if(tipo==='excel'){
    expExcel(headers, rows);
  } else if(tipo==='pdf_lista'){
    expPDFLista(dias);
  } else if(tipo==='pdf_facturas'){
    expPDFFacturas();
  }
}

function dlBlob(data, mime, filename){
  var blob=new Blob([data],{type:mime});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
}

function expExcel(headers, rows){
  // Build minimal XLSX using XML
  var xml='<?xml version="1.0" encoding="UTF-8"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Worksheet ss:Name="Actividad"><Table>';
  var addRow=function(cells,bold){
    var r='<Row>'+cells.map(function(c){
      var t=isNaN(c)||c===''?'String':'Number';
      var st=bold?' ss:StyleID="bold"':'';
      return '<Cell'+st+'><Data ss:Type="'+t+'">'+String(c).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</Data></Cell>';
    }).join('')+'</Row>';
    return r;
  };
  xml+='<Row><Cell ss:StyleID="bold"><Data ss:Type="String">Exportación actividad médica</Data></Cell></Row>';
  xml+=addRow(headers,true);
  rows.forEach(function(r){ xml+=addRow(r,false); });
  xml+='</Table></Worksheet></Workbook>';
  // Need styles
  xml=xml.replace('<Workbook ','<Workbook xmlns:x="urn:schemas-microsoft-com:office:excel" ');
  xml=xml.replace('</Workbook>','');
  xml='<?xml version="1.0" encoding="UTF-8"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Styles><Style ss:ID="bold"><Font ss:Bold="1"/></Style></Styles><Worksheet ss:Name="Actividad"><Table>'
    +addRow(headers,true)
    +rows.map(function(r){return addRow(r,false);}).join('')
    +'</Table></Worksheet></Workbook>';
  dlBlob(xml,'application/vnd.ms-excel','Actividad.xls');
  toast('Excel descargado ✓','tok');
}

function expPDFLista(dias){
  var jsPDF2=window.jspdf&&window.jspdf.jsPDF;
  if(!jsPDF2){ toast('PDF no disponible','ter'); return; }
  var doc=new jsPDF2({unit:'mm',format:'a4'});
  var cfg=DB.get('cfg')||{};
  doc.setFontSize(14); doc.setFont('helvetica','bold'); doc.text('Resumen de actividad',18,20);
  doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(120,120,120);
  doc.text(cfg.nombre||'',18,28);
  // Group by acto
  var actoTot={};
  dias.forEach(function(d){
    Object.keys(d.actos||{}).forEach(function(aid){
      actoTot[aid]=(actoTot[aid]||0)+(d.actos[aid]||0);
    });
  });
  var body=sortedActos().filter(function(a){return actoTot[a.id]>0;}).map(function(a){
    return [a.nombre,actoTot[a.id],M(a.precio)+' €',M(actoTot[a.id]*a.precio)+' €'];
  });

// ── PDF ───────────────────────────────────────────────────────────────────────
function buildPDF(fid){
  var jsPDF2=window.jspdf&&window.jspdf.jsPDF;
  var f=DB.arr('facturas').find(function(x){return x.id===fid;}); if(!f||!jsPDF2) return null;
  var cfg=DB.get('cfg')||{};
  var cli=DB.arr('clientes').find(function(c){return c.id===f.cliente;})||{};
  var suc=DB.arr('sucursales').find(function(s){return s.id===f.suc;})||{};
  var doc=new jsPDF2({unit:'mm',format:'a4'});
  var W=210, MG=18;
  // White background for PDF
  doc.setFillColor(255,255,255); doc.rect(0,0,W,297,'F');
  // Header bar
  doc.setFillColor(20,20,20); doc.rect(0,0,W,32,'F');
  // Logo in header
  try{ doc.addImage(LOGO_B64,'PNG',MG,4,48,24); }catch(e){}
  doc.setTextColor(212,170,90); doc.setFontSize(16); doc.setFont('helvetica','bold'); doc.text('FACTURA',W/2,14,{align:'center'});
  doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(180,180,180);
  doc.text(f.num,W/2,21,{align:'center'});
  doc.text(ML(f.mes)+' | '+Dt(f.femision),W-MG,21,{align:'right'});
  var ec={borrador:[80,80,80],emitida:[0,180,140],pagada:[0,180,140]};
  doc.setFillColor.apply(doc,ec[f.estado]||[80,80,80]); doc.roundedRect(W-MG-28,4,30,10,2,2,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(8);
  doc.text({borrador:'BORRADOR',emitida:'EMITIDA',pagada:'PAGADA'}[f.estado]||'',W-MG-13,10,{align:'center'});
  var y=36;
  var blocks=[[cfg.nombre||'',cfg.nif||'',cfg.dir||'',(cfg.cp||'')+' '+(cfg.ciudad||''),cfg.email||'','EMISOR'],[cli.nombre||'',cli.nif||'',cli.dir||'',(cli.cp||'')+' '+(cli.ciudad||''),cli.email||'','CLIENTE'],[suc.nombre||NS(f.suc||''),suc.resp||'',suc.dir||'','','','SUCURSAL']];
  blocks.forEach(function(b,ci){
    var x=MG+ci*62;
    doc.setFillColor(248,248,248); doc.rect(x,y,59,32,'F');
    doc.setFontSize(7); doc.setTextColor(130,130,130); doc.setFont('helvetica','bold'); doc.text(b[5],x+3,y+5.5);
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(20,20,20); doc.text(b[0],x+3,y+11);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(80,80,80);
    [b[1],b[2],b[3],b[4]].filter(Boolean).forEach(function(ln,li){ doc.text(ln,x+3,y+17+li*4.5); });
  });
  y+=38;
  var sub=f.sub||f.lineas.reduce(function(s,l){return s+l.total;},0);
  var ivap=f.ivap!=null?f.ivap:0;
  var ivai=f.ivai!=null?f.ivai:sub*ivap/100;
  doc.autoTable({startY:y,head:[['Descripción','Sucursal','Cant.','Precio unit.','Total']],body:f.lineas.map(function(l){return [l.desc,l.suc||'',l.uds,M(l.precio)+' €',M(l.total)+' €'];}),theme:'grid',headStyles:{fillColor:[20,20,20],textColor:[212,170,90],fontStyle:'bold',fontSize:8.5},bodyStyles:{fontSize:9,textColor:[30,30,30]},columnStyles:{1:{fontSize:8,textColor:[100,100,100]},2:{halign:'center',cellWidth:18},3:{halign:'right',cellWidth:28},4:{halign:'right',cellWidth:28}},margin:{left:MG,right:MG}});
  y=doc.lastAutoTable.finalY+4;
  var tw=68, tx=W-MG-tw;
  doc.setFillColor(248,248,248); doc.rect(tx,y,tw,20,'F');
  doc.setFontSize(9); doc.setTextColor(100,100,100);
  doc.text('Subtotal:',tx+4,y+7); doc.text('IVA ('+ivap+'%):',tx+4,y+14);
  doc.setTextColor(30,30,30);
  doc.text(M(sub)+' €',tx+tw-2,y+7,{align:'right'}); doc.text(M(ivai)+' €',tx+tw-2,y+14,{align:'right'});
  y+=22; doc.setFillColor(20,20,20); doc.rect(tx,y,tw,10,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text('TOTAL',tx+4,y+7); doc.text(M(f.total)+' €',tx+tw-2,y+7,{align:'right'});
  if(f.obs){ y+=14; doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(100,100,100); doc.text('Notas: '+f.obs,MG,y); }
  doc.setFillColor(20,20,20); doc.rect(0,285,W,12,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text(cfg.nombre||'',MG,292); doc.text(cfg.email||'',W/2,292,{align:'center'}); doc.text(cfg.tel||'',W-MG,292,{align:'right'});
  return doc;
}

function acmMover(id,dir){
  var actos=sortedActos();
  var idx=actos.findIndex(function(a){return a.id===id;});
  if(idx<0) return;
  var ni=idx+dir;
  if(ni<0||ni>=actos.length) return;
  var tmp=actos[idx]; actos[idx]=actos[ni]; actos[ni]=tmp;
  actos.forEach(function(a,i){a.orden=i+1;});
  DB.save('actos',actos); go('actos');
}

// Migrate old 'registros' format to new 'dias' format
(function migrate(){
  if(DB.get('migrated_v2')) return;
  var oldRegs = DB.arr('registros');
  if(oldRegs.length > 0 && !DB.arr('dias').length) {
    // Group old registros by fecha+sucursal+cliente
    var groups = {};
    oldRegs.forEach(function(r) {
      var key = r.fecha + '||' + (r.sucursal||'') + '||' + (r.cliente||'');
      if(!groups[key]) groups[key] = {id:uid(), fecha:r.fecha, sucursal:r.sucursal||'', cliente:r.cliente||'', actos:{}, obs:r.obs||'', total:0};
      if(r.acto) groups[key].actos[r.acto] = (groups[key].actos[r.acto]||0) + (r.uds||r.unidades||1);
    });
    var dias = Object.values(groups).map(function(d) {
      var t=0; Object.keys(d.actos).forEach(function(aid){t+=(d.actos[aid]||0)*PA(aid);});
      d.total=t; return d;
    });
    if(dias.length) DB.save('dias', dias);
  }
  DB.set('migrated_v2', true);
})();

seed();
go('dashboard');
