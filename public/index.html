<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advance Gastro — Facturación</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg: #0a0c10;
  --bg2: #0f1318;
  --sur: #141920;
  --sur2: #1a2030;
  --bor: #1e2a38;
  --bor2: #263345;
  --tx: #e8edf5;
  --tx2: #7a8fa8;
  --tx3: #3d5068;
  --gold: #c9a84c;
  --gold2: #e8c56a;
  --ac: #00d4aa;
  --acl: #00d4aa18;
  --acd: #00b894;
  --re: #f85149;
  --rel: #f8514918;
  --am: #f0b429;
  --aml: #f0b42918;
  --gr: #3fb950;
  --grl: #3fb95018;
  --r: 8px;
  --r2: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--tx);
  font-size: 14px;
  line-height: 1.5;
  height: 100vh;
  overflow: hidden;
  display: flex;
}
/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--bor2); border-radius: 4px; }

/* Layout */
aside {
  width: 230px;
  background: var(--bg2);
  border-right: 1px solid var(--bor);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  height: 100vh;
}
#MC {
  flex: 1;
  overflow-y: auto;
  height: 100vh;
  background: var(--bg);
}

/* Logo */
.logo-wrap {
  padding: 16px;
  border-bottom: 1px solid var(--bor);
  background: #0c0e12;
}
.logo-wrap img { width: 100%; border-radius: 4px; display: block; }

/* Nav */
nav { flex: 1; padding: 8px; overflow-y: auto; }
.ns {
  font-size: 10px;
  font-weight: 600;
  color: var(--tx3);
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 14px 8px 6px;
}
.ni {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: var(--r);
  cursor: pointer;
  color: var(--tx2);
  font-size: 13px;
  font-weight: 400;
  transition: all .15s;
  margin-bottom: 1px;
  user-select: none;
  position: relative;
}
.ni:hover { background: var(--sur); color: var(--tx); }
.ni.on {
  background: var(--acl);
  color: var(--ac);
  font-weight: 500;
}
.ni.on::before {
  content: '';
  position: absolute;
  left: 0;
  top: 4px;
  bottom: 4px;
  width: 2px;
  background: var(--ac);
  border-radius: 2px;
}
.ni svg { width: 15px; height: 15px; flex-shrink: 0; }
.nb {
  margin-left: auto;
  background: var(--ac);
  color: #000;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
}

/* Header */
.hdr {
  padding: 24px 28px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.htit {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.3px;
  color: var(--tx);
}
.hsub { font-size: 13px; color: var(--tx2); margin-top: 2px; }
.hact { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.cnt { padding: 20px 28px 40px; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--r);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  font-family: 'Space Grotesk', sans-serif;
  transition: all .15s;
  white-space: nowrap;
}
.bp { background: var(--ac); color: #000; font-weight: 600; }
.bp:hover { background: var(--acd); }
.bs { background: var(--sur); color: var(--tx); border: 1px solid var(--bor); }
.bs:hover { background: var(--sur2); border-color: var(--bor2); }
.bg { background: transparent; color: var(--tx2); padding: 7px 10px; }
.bg:hover { background: var(--sur); color: var(--tx); }
.bd { background: var(--rel); color: var(--re); border: 1px solid var(--re)30; }
.bd:hover { background: var(--re)25; }
.bgold { background: var(--gold)18; color: var(--gold); border: 1px solid var(--gold)30; }
.bgold:hover { background: var(--gold)28; }
.sm { padding: 5px 10px; font-size: 12px; }
.btn svg { width: 14px; height: 14px; }

/* Stat cards */
.cgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
.scard {
  background: var(--sur);
  border: 1px solid var(--bor);
  border-radius: var(--r2);
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}
.scard::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--ac);
  opacity: .4;
}
.scard.gold::before { background: var(--gold); }
.scard.red::before { background: var(--re); }
.scard.green::before { background: var(--gr); }
.slbl {
  font-size: 10.5px;
  color: var(--tx3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 6px;
}
.sval {
  font-size: 24px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: var(--ac);
  letter-spacing: -.5px;
}
.sval.gold { color: var(--gold); }
.sval.white { color: var(--tx); }
.sval.green { color: var(--gr); }
.sval.red { color: var(--re); }
.ssub { font-size: 11.5px; color: var(--tx2); margin-top: 3px; }

/* Tables */
.tw {
  background: var(--sur);
  border: 1px solid var(--bor);
  border-radius: var(--r2);
  overflow: hidden;
  margin-bottom: 16px;
}
.th2 {
  padding: 14px 18px;
  border-bottom: 1px solid var(--bor);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
  background: var(--bg2);
}
.th2 h3 { font-size: 13px; font-weight: 600; color: var(--tx); }
table { width: 100%; border-collapse: collapse; }
th {
  font-size: 10.5px;
  font-weight: 600;
  color: var(--tx3);
  text-transform: uppercase;
  letter-spacing: .07em;
  padding: 9px 16px;
  text-align: left;
  background: var(--bg2);
  border-bottom: 1px solid var(--bor);
}
td { padding: 10px 16px; border-bottom: 1px solid var(--bor); font-size: 13px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--sur2); }
.tda { display: flex; gap: 4px; justify-content: flex-end; }

/* Badges */
.bdg { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.bgr { background: var(--grl); color: var(--gr); }
.bbl { background: var(--acl); color: var(--ac); }
.bgy { background: var(--sur2); color: var(--tx2); border: 1px solid var(--bor); }
.bam { background: var(--aml); color: var(--am); }

/* Modal */
.ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.ov.open { display: flex; }
.mo {
  background: var(--sur);
  border: 1px solid var(--bor2);
  border-radius: 14px;
  padding: 24px;
  width: 100%;
  max-width: 520px;
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
}
.mow { max-width: 700px; }
.moxl { max-width: 860px; }
.mo h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--tx); }

/* Forms */
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 11.5px; font-weight: 600; color: var(--tx2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
.fg input, .fg select, .fg textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--bor);
  border-radius: var(--r);
  font-size: 13.5px;
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg2);
  color: var(--tx);
  outline: none;
  transition: border-color .15s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--ac); background: var(--bg2); }
.fg textarea { resize: vertical; min-height: 70px; }
.fg select option { background: var(--sur); }
.fr { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.fr3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.fa { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--bor); }

/* Misc */
.flt { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
.fsel {
  padding: 7px 10px;
  border: 1px solid var(--bor);
  border-radius: var(--r);
  font-size: 12.5px;
  font-family: 'Space Grotesk', sans-serif;
  background: var(--sur);
  color: var(--tx2);
  cursor: pointer;
  outline: none;
}
.fsel:focus { border-color: var(--ac); color: var(--tx); }
.emp { padding: 48px 20px; text-align: center; color: var(--tx3); }
.emp-i { font-size: 32px; margin-bottom: 10px; }
.TC { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.tst {
  background: var(--sur2);
  border: 1px solid var(--bor2);
  color: var(--tx);
  padding: 10px 16px;
  border-radius: var(--r);
  font-size: 13px;
  font-weight: 500;
  animation: ti .2s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tok { background: var(--grl); border-color: var(--gr); color: var(--gr); }
.ter { background: var(--rel); border-color: var(--re); color: var(--re); }
@keyframes ti { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.stit { font-size: 11px; font-weight: 600; color: var(--tx3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; margin-top: 18px; }
.div { height: 1px; background: var(--bor); margin: 18px 0; }
.mnav { display: flex; align-items: center; gap: 8px; background: var(--sur); border: 1px solid var(--bor); border-radius: var(--r); padding: 4px 10px; }
.mnav span { font-size: 13px; font-weight: 500; min-width: 110px; text-align: center; }
.alrt { padding: 10px 14px; border-radius: var(--r); font-size: 13px; margin-bottom: 14px; }
.aam { background: var(--aml); color: var(--am); border: 1px solid var(--am)30; }
.mono { font-family: 'JetBrains Mono', monospace; font-size: .92em; }
.csec { background: var(--sur); border: 1px solid var(--bor); border-radius: var(--r2); padding: 20px; margin-bottom: 14px; }
.csec h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--gold); }

/* Day cards */
.dcard { background: var(--sur); border: 1px solid var(--bor); border-radius: var(--r2); margin-bottom: 10px; overflow: hidden; }
.dcard-hdr {
  padding: 12px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--bor);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

/* Register quick */
.rw { background: var(--sur); border: 1px solid var(--bor); border-radius: var(--r2); overflow: hidden; }
.rt { padding: 14px 18px; border-bottom: 1px solid var(--bor); background: var(--bg2); display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
.rf label { display: block; font-size: 11px; font-weight: 600; color: var(--tx3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.rf select, .rf input[type=date] { padding: 7px 10px; border: 1px solid var(--bor); border-radius: var(--r); font-size: 13px; font-family: 'Space Grotesk', sans-serif; background: var(--bg2); color: var(--tx); outline: none; }
.rf select:focus, .rf input:focus { border-color: var(--ac); }
.qi { width: 80px; padding: 6px 8px; border: 1px solid var(--bor); border-radius: 6px; font-size: 14px; font-family: 'JetBrains Mono', monospace; text-align: center; background: var(--bg2); color: var(--tx); outline: none; transition: all .15s; }
.qi:focus { border-color: var(--ac); background: var(--acl); }
.qi:not([value=''])[value!='0'] { border-color: var(--ac)60; color: var(--ac); }
.rtot { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--tx2); text-align: right; min-width: 80px; }
.rb { padding: 14px 18px; border-top: 1px solid var(--bor); display: flex; align-items: center; justify-content: space-between; background: var(--bg2); }

/* Line editor */
.le { display: grid; grid-template-columns: 1fr 66px 86px 76px 28px; gap: 6px; align-items: center; margin-bottom: 6px; }
.le input { padding: 5px 8px; border: 1px solid var(--bor); border-radius: 6px; font-size: 13px; font-family: 'Space Grotesk', sans-serif; background: var(--bg2); color: var(--tx); outline: none; }
.le input:focus { border-color: var(--ac); }
.let { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--tx2); text-align: right; }
.led { background: none; border: none; color: var(--tx3); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 3px; border-radius: 4px; }
.led:hover { background: var(--rel); color: var(--re); }
.leh { display: grid; grid-template-columns: 1fr 66px 86px 76px 28px; gap: 6px; margin-bottom: 5px; }
.leh span { font-size: 10px; font-weight: 600; color: var(--tx3); text-transform: uppercase; letter-spacing: .05em; }

/* Import area */
.imp-zone { border: 2px dashed var(--bor2); border-radius: var(--r2); padding: 28px; text-align: center; cursor: pointer; transition: all .2s; }
.imp-zone:hover { border-color: var(--ac); background: var(--acl); }

/* Loading spinner */
.spin { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--bor2); border-top-color: var(--ac); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

// ── DB — Server-first with safe concurrent writes ────────────────────────────
var DB = {
  _cache: {},
  _loaded: false,

  loadAll: function(cb) {
    var self = this;
    fetch('/api/data')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        self._cache = data || {};
        self._loaded = true;
        if (cb) cb();
      })
      .catch(function(e) {
        console.warn('Server unavailable, using cache:', e.message);
        self._loaded = true;
        if (cb) cb();
      });
  },

  get: function(k) {
    if (this._cache[k] !== undefined) return this._cache[k];
    return null;
  },

  set: function(k, v) {
    this._cache[k] = v;
    return fetch('/api/data/' + k, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value: v })
    }).then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).catch(function(e) {
      console.error('Save error [' + k + ']:', e.message);
    });
  },

  arr: function(k) { return this.get(k) || []; },
  save: function(k, v) { return this.set(k, v); },

  // Safe array append — always fetches fresh first to avoid overwrites
  safeAppend: function(k, item, cb) {
    var self = this;
    fetch('/api/data/' + k)
      .then(function(r) { return r.json(); })
      .then(function(serverData) {
        var current = Array.isArray(serverData) ? serverData : [];
        var ids = {};
        current.forEach(function(x) { if (x.id) ids[x.id] = true; });
        if (!ids[item.id]) current = current.concat([item]);
        self._cache[k] = current;
        return fetch('/api/data/' + k, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ value: current })
        });
      })
      .then(function() { if (cb) cb(); })
      .catch(function(e) { console.error('safeAppend error:', e); if (cb) cb(); });
  },

  safeUpdate: function(k, item, cb) {
    var self = this;
    fetch('/api/data/' + k)
      .then(function(r) { return r.json(); })
      .then(function(serverData) {
        var current = Array.isArray(serverData) ? serverData : [];
        var merged = current.map(function(x) { return x.id === item.id ? item : x; });
        self._cache[k] = merged;
        return fetch('/api/data/' + k, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ value: merged })
        });
      })
      .then(function() { if (cb) cb(); })
      .catch(function(e) { console.error('safeUpdate error:', e); if (cb) cb(); });
  },

  safeDelete: function(k, id, cb) {
    var self = this;
    fetch('/api/data/' + k)
      .then(function(r) { return r.json(); })
      .then(function(serverData) {
        var current = Array.isArray(serverData) ? serverData : [];
        var merged = current.filter(function(x) { return x.id !== id; });
        self._cache[k] = merged;
        return fetch('/api/data/' + k, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ value: merged })
        });
      })
      .then(function() { if (cb) cb(); })
      .catch(function(e) { console.error('safeDelete error:', e); if (cb) cb(); });
  }
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function M(n) { return Number(n).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function Dt(s) { if (!s) return ''; var p = s.split('-'); return p[2] + '/' + p[1] + '/' + p[0]; }
function ML(m) { if (!m) return ''; var p = m.split('-'); return ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(p[1])-1] + ' ' + p[0]; }
function AM(m, n) { var d = new Date(m + '-01'); d.setMonth(d.getMonth() + n); return d.toISOString().slice(0, 7); }
function CM() { return new Date().toISOString().slice(0, 7); }
function CY() { return new Date().getFullYear(); }
function NC(id) { var c = DB.arr('clientes').find(function(x) { return x.id === id; }); return c ? c.nombre : ''; }
function NS(id) { var s = DB.arr('sucursales').find(function(x) { return x.id === id; }); return s ? s.nombre : ''; }
function PA(id) { var a = DB.arr('actos').find(function(x) { return x.id === id; }); return a ? a.precio : 0; }
function NA(id) { var a = DB.arr('actos').find(function(x) { return x.id === id; }); return a ? a.nombre : ''; }
function sortedActos() { return DB.arr('actos').slice().sort(function(a, b) { return (a.orden||99) - (b.orden||99); }); }
function diaTotal(d) {
  var t = 0;
  if (d.actos && typeof d.actos === 'object') {
    Object.keys(d.actos).forEach(function(aid) { t += (d.actos[aid]||0) * PA(aid); });
  }
  return t;
}
function BEST(e) {
  var m = { borrador: 'bgy', emitida: 'bbl', pagada: 'bgr' };
  var l = { borrador: 'Borrador', emitida: 'Emitida', pagada: 'Pagada' };
  return '<span class="bdg ' + (m[e]||'bgy') + '">' + (l[e]||e) + '</span>';
}
function NSEQ() {
  var cfg = DB.get('cfg') || {};
  var s = (DB.get('seq')||0) + 1;
  DB.set('seq', s);
  return (cfg.pref||'FAC') + '-' + new Date().getFullYear() + '-' + ('000' + s).slice(-4);
}

  var facts = DB.arr('facturas').filter(function(f) { return f.mes === mes; });
  var tAct = dias.reduce(function(s, d) { return s + diaTotal(d); }, 0);
  var tFact = facts.reduce(function(s, f) { return s + f.total; }, 0);
  var tPag = facts.filter(function(f) { return f.estado === 'pagada'; }).reduce(function(s, f) { return s + f.total; }, 0);
  var cr = new Set(dias.map(function(d) { return d.cliente; }));
  var cf = new Set(facts.map(function(f) { return f.cliente; }));
  var pend = []; cr.forEach(function(c) { if (!cf.has(c)) pend.push(c); });

  // Actos summary
  var at = {};
  dias.forEach(function(d) {
    Object.keys(d.actos||{}).forEach(function(aid) { at[aid] = (at[aid]||0) + (d.actos[aid]||0); });
  });
  var actCards = sortedActos().filter(function(a) { return at[a.id] > 0; }).map(function(a) {

    var al = sortedActos().filter(function(a){return (d.actos[a.id]||0)>0;}).map(function(a){return a.nombre+':'+d.actos[a.id];}).join(', ');

  var rf = facts.map(function(f){

  }).join('') || '<tr><td colspan="5"><div class="emp"><div class="emp-i">📄</div><p>Sin facturas</p></div></td></tr>';

    + '<div class="cnt">' + alrt

    + '<div class="scard green"><div class="slbl">Facturado</div><div class="sval green">' + M(tFact) + ' €</div><div class="ssub">' + facts.length + ' facturas</div></div>'
    + '<div class="scard"><div class="slbl">Cobrado</div><div class="sval white">' + M(tPag) + ' €</div><div class="ssub">Pagadas</div></div>'

    + '</div>'
    + '<div class="stit" style="margin-top:0">Resumen de actos — ' + ML(mes) + '</div>'

  sortedActos().forEach(function(a) {

    if (q > 0) actosMap[a.id] = q;

  if (!Object.keys(actosMap).length) { toast('⚠️ No hay cantidades introducidas', 'ter'); return; }
  var total = 0; Object.keys(actosMap).forEach(function(aid) { total += (actosMap[aid]||0) * PA(aid); });
  var dia = { id: uid(), fecha: fecha, sucursal: sucursal, cliente: cliente, actos: actosMap, obs: obs, total: total };

  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Guardando...'; }
  DB.safeAppend('dias', dia, function() {
    toast('✓ Día guardado correctamente', 'tok');
    regLimpiar(); badge();
    if (btn) { btn.disabled = false; btn.innerHTML = 'Guardar día'; }
  });
}

function impTabla(input) {
  var file = input.files[0]; if (!file) return;
  var st = document.getElementById('imp-st');
  st.style.display = 'block'; st.textContent = '⏳ Leyendo tabla...';
  var reader = new FileReader();
  reader.onload = function(e) {
    if (typeof XLSX === 'undefined') {
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload = function() { parsePlantilla(e.target.result); };
      s.onerror = function() { st.textContent = '❌ Error cargando librería'; };
      document.head.appendChild(s);
    } else {
      parsePlantilla(e.target.result);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parsePlantilla(buffer) {
  var st = document.getElementById('imp-st');
  try {
    var wb = XLSX.read(buffer, { type: 'array' });
    var allDias = [];
    wb.SheetNames.forEach(function(sheetName) {
      var ws = wb.Sheets[sheetName];
      var data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      var hRow = -1, cliId = '';
      for (var i = 0; i < Math.min(10, data.length); i++) {
        if (String(data[i][0]).toLowerCase().includes('cliente_id')) cliId = String(data[i][1]||'').trim();
        if (String(data[i][0]).toLowerCase() === 'fecha') hRow = i;
      }
      if (hRow === -1) return;
      var hdrs = data[hRow].map(function(h) { return String(h||'').trim(); });
      var fCol = hdrs.indexOf('fecha'), sCol = hdrs.indexOf('sucursal_id'), oCol = hdrs.indexOf('obs');
      if (fCol === -1 || sCol === -1) return;
      var aIds = DB.arr('actos').map(function(a) { return a.id; });
      var aCols = {};
      hdrs.forEach(function(h, ci) { if (aIds.indexOf(h) > -1) aCols[h] = ci; });
      for (var ri = hRow + 1; ri < data.length; ri++) {
        var row = data[ri];
        var fecha = String(row[fCol]||'').trim();
        if (!fecha || !fecha.match(/^\d{4}-\d{2}-\d{2}$/)) continue;
        var sucId = String(row[sCol]||'').trim(); if (!sucId) continue;
        var am = {}, hasA = false;
        Object.keys(aCols).forEach(function(aid) {
          var v = parseInt(row[aCols[aid]])||0; if (v > 0) { am[aid] = v; hasA = true; }
        });
        if (!hasA) continue;
        var obs = String(row[oCol]||'').trim();
        var cid = cliId;
        if (!cid) { var sx = DB.arr('sucursales').find(function(s){return s.id===sucId;}); cid = sx && sx.clientes && sx.clientes[0] ? sx.clientes[0] : ''; }
        var tot = 0; Object.keys(am).forEach(function(aid){tot+=(am[aid]||0)*PA(aid);});
        allDias.push({ fecha: fecha, sucursal_id: sucId, cliente_id: cid, actos: am, obs: obs, total: tot });
      }
    });
    if (!allDias.length) { st.textContent = '⚠️ No se encontraron datos. Revisa que la fecha es AAAA-MM-DD y sucursal_id correcto.'; return; }
    mostrarPreview(allDias);
  } catch(e) {
    st.textContent = '❌ Error: ' + e.message;
  }
}

function impFoto(input) {
  var file = input.files[0]; if (!file) return;
  var st = document.getElementById('imp-st');
  st.style.display = 'block'; st.textContent = '⏳ Procesando imagen con IA...';
  var reader = new FileReader();
  reader.onload = function(e) {
    var b64 = e.target.result.split(',')[1];
    var actos = sortedActos(), cli = DB.arr('clientes'), suc = DB.arr('sucursales');
    var prompt = ['Extrae datos de actividad medica de esta imagen.',
      'ACTOS: ' + actos.map(function(a){return a.nombre+'='+a.id+'('+a.precio+'eur)';}).join(', '),
      'CLIENTES: ' + cli.map(function(c){return c.nombre+'='+c.id;}).join(', '),
      'SUCURSALES: ' + suc.map(function(s){return s.nombre+'='+s.id+'(cli:'+s.clientes[0]+')';}).join(', '),
      'Para cada dia: fecha YYYY-MM-DD (anio='+new Date().getFullYear()+'), sucursal_id, cliente_id, actos:{id:cantidad}, obs.',
      'Responde SOLO JSON: {"dias":[{"fecha":"YYYY-MM-DD","sucursal_id":"s1","cliente_id":"c1","actos":{"a1":3},"obs":""}]}'
    ].join('\n');
    fetch('/api/ia/import', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: [{ type: 'image', source: { type: 'base64', media_type: file.type, data: b64 } }, { type: 'text', text: prompt }] }] })
    }).then(function(r){return r.json();})
    .then(function(data){
      if (data.error) throw new Error(data.error.message || data.error);
      var text = data.content[0].text;
      var m = text.match(/\{[\s\S]*\}/);
      if (!m) throw new Error('No JSON encontrado');
      var result = JSON.parse(m[0]);
      var dias = (result.dias||[]).map(function(d){
        var tot=0; Object.keys(d.actos||{}).forEach(function(aid){tot+=(d.actos[aid]||0)*PA(aid);});
        return {fecha:d.fecha,sucursal_id:d.sucursal_id,cliente_id:d.cliente_id,actos:d.actos||{},obs:d.obs||'',total:tot};
      });
      mostrarPreview(dias);
    })
    .catch(function(e){ st.textContent='❌ Error IA: '+e.message; st.style.color='var(--re)'; });
  };
  reader.readAsDataURL(file);
}

function mostrarPreview(dias) {
  var st = document.getElementById('imp-st'), pre = document.getElementById('imp-pre'), act = document.getElementById('imp-act');
  if (!dias.length) { st.textContent = '⚠️ Sin datos encontrados'; return; }
  st.textContent = '✅ ' + dias.length + ' días encontrados — revisa y confirma';
  st.style.color = 'var(--gr)';
  var rows = dias.map(function(d){
    var al = sortedActos().filter(function(a){return (d.actos[a.id]||0)>0;}).map(function(a){return a.nombre+': '+d.actos[a.id];}).join(', ');
    var tot=0; Object.keys(d.actos||{}).forEach(function(aid){tot+=(d.actos[aid]||0)*PA(aid);});
    return '<tr><td>'+Dt(d.fecha)+'</td><td>'+NS(d.sucursal_id||'')+'</td><td>'+NC(d.cliente_id||'')+'</td><td style="font-size:11px;color:var(--tx2)">'+al+'</td><td class="mono">'+M(tot)+' €</td></tr>';
  }).join('');
  pre.style.display = 'block';
  pre.innerHTML = '<div style="max-height:260px;overflow-y:auto;border:1px solid var(--bor);border-radius:8px;margin-bottom:10px"><table style="width:100%"><thead><tr><th style="padding:8px;background:var(--bg2);font-size:11px">Fecha</th><th style="padding:8px;background:var(--bg2);font-size:11px">Sucursal</th><th style="padding:8px;background:var(--bg2);font-size:11px">Cliente</th><th style="padding:8px;background:var(--bg2);font-size:11px">Actos</th><th style="padding:8px;background:var(--bg2);font-size:11px">Total</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  window._impDias = dias;
  act.innerHTML = '<button class="btn bs" onclick="closeM()">Cancelar</button><button class="btn bp" onclick="confirmarImport()">Importar ' + dias.length + ' días</button>';
}

function confirmarImport() {
  var dias = window._impDias || [];
  if (!dias.length) { closeM(); return; }
  var items = dias.map(function(d) {
    var am = {}; Object.keys(d.actos||{}).forEach(function(k){if((d.actos[k]||0)>0)am[k]=d.actos[k];});
    var tot=0; Object.keys(am).forEach(function(aid){tot+=(am[aid]||0)*PA(aid);});
    return {id:uid(),fecha:d.fecha,sucursal:d.sucursal_id||'',cliente:d.cliente_id||'',actos:am,obs:d.obs||'',total:tot};
  });
  var pending = items.slice();
  function next() {
    if (!pending.length) { closeM(); toast('✓ ' + items.length + ' días importados', 'tok'); badge(); if(PAGE==='actividad')go('actividad'); if(PAGE==='dashboard')go('dashboard'); return; }
    DB.safeAppend('dias', pending.shift(), next);
  }
  next();
}

function _facGen(cid,mes,agrup){
  var dias=DB.arr('dias').filter(function(d){return d.fecha&&d.fecha.startsWith(mes)&&d.cliente===cid;});
  if(agrup!=='todas')dias=dias.filter(function(d){return d.sucursal===agrup;});
  if(!dias.length){toast('⚠️ Sin actividad para este período','ter');return;}
  var at={};
  dias.forEach(function(d){Object.keys(d.actos||{}).forEach(function(aid){at[aid]=(at[aid]||0)+(d.actos[aid]||0);});});
  var lineas=sortedActos().filter(function(a){return at[a.id]>0;}).map(function(a){return {desc:a.nombre,uds:at[a.id],precio:a.precio,total:at[a.id]*a.precio};});
  var sub=lineas.reduce(function(s,l){return s+l.total;},0);
  var cfg=DB.get('cfg')||{};
  var ivap=cfg.iva!=null?cfg.iva:0;
  var ivai=sub*ivap/100;
  var f={id:uid(),num:NSEQ(),cliente:cid,mes:mes,femision:lastDay(mes),fvenc:'',estado:'borrador',sub:sub,ivap:ivap,ivai:ivai,total:sub+ivai,lineas:lineas,obs:''};
  DB.safeAppend('facturas',f,function(){closeM();toast('✓ Factura creada: '+f.num,'tok');go('facturas');badge();});
}

facEdit(\''+id+'\')">Editar</button><button class="btn bgold" onclick="dlPDF(\''+id+'\')">↓ PDF</button></div>','mow');

// ── PDF ───────────────────────────────────────────────────────────────────────
function buildPDF(fid){
  var jsPDF2=window.jspdf&&window.jspdf.jsPDF;
  var f=DB.arr('facturas').find(function(x){return x.id===fid;});if(!f||!jsPDF2)return null;
  var cfg=DB.get('cfg')||{},cli=DB.arr('clientes').find(function(c){return c.id===f.cliente;})||{};
  var doc=new jsPDF2({unit:'mm',format:'a4'});
  var W=210,MG=18;
  doc.setFillColor(10,12,16);doc.rect(0,0,W,32,'F');
  try{doc.addImage(LOGO_DATA,'PNG',MG,4,52,24);}catch(e){}
  doc.setTextColor(201,168,76);doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text('FACTURA',W-MG,14,{align:'right'});
  doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(180,180,180);doc.text(f.num,W-MG,21,{align:'right'});
  doc.text(ML(f.mes)+' | '+Dt(f.femision),W-MG,27,{align:'right'});
  var ec={borrador:[100,100,100],emitida:[0,180,140],pagada:[63,185,80]};
  doc.setFillColor.apply(doc,ec[f.estado]||[100,100,100]);doc.roundedRect(MG,38,32,8,2,2,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(8);doc.text({borrador:'BORRADOR',emitida:'EMITIDA',pagada:'PAGADA'}[f.estado]||'',MG+16,43,{align:'center'});
  var y=38;
  var blocks=[[cfg.nombre||'',cfg.nif||'',cfg.dir||'',(cfg.cp||'')+' '+(cfg.ciudad||''),cfg.email||'','EMISOR'],[cli.nombre||'',cli.nif||'',cli.dir||'',(cli.cp||'')+' '+(cli.ciudad||''),cli.email||'','CLIENTE']];
  blocks.forEach(function(b,ci){
    var x=MG+ci*90;
    doc.setFillColor(20,25,32);doc.rect(x,y+12,85,28,'F');
    doc.setFontSize(7);doc.setTextColor(61,80,104);doc.setFont('helvetica','bold');doc.text(b[5],x+4,y+18);
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(232,205,106);doc.text(b[0],x+4,y+24);
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(122,143,168);
    [b[1],b[2],b[3],b[4]].filter(Boolean).forEach(function(ln,li){doc.text(ln,x+4,y+30+li*4.5);});
  });
  y+=46;
  var sub=f.sub||f.lineas.reduce(function(s,l){return s+l.total;},0);
  var ivap=f.ivap!=null?f.ivap:0;var ivai=f.ivai!=null?f.ivai:sub*ivap/100;
  doc.autoTable({startY:y,head:[['Descripción','Cant.','Precio unit.','Total']],body:f.lineas.map(function(l){return [l.desc,l.uds,M(l.precio)+' €',M(l.total)+' €'];}),theme:'grid',headStyles:{fillColor:[20,25,32],textColor:[201,168,76],fontStyle:'bold',fontSize:9},bodyStyles:{fontSize:9,textColor:[200,210,220],fillColor:[14,19,26]},alternateRowStyles:{fillColor:[18,23,30]},columnStyles:{1:{halign:'center',cellWidth:20},2:{halign:'right',cellWidth:30},3:{halign:'right',cellWidth:30}},margin:{left:MG,right:MG}});
  y=doc.lastAutoTable.finalY+4;
  var tw=70,tx=W-MG-tw;
  doc.setFillColor(20,25,32);doc.rect(tx,y,tw,22,'F');
  doc.setFontSize(9);doc.setTextColor(122,143,168);doc.text('Subtotal:',tx+4,y+8);doc.text('IVA ('+ivap+'%):',tx+4,y+16);
  doc.setTextColor(200,210,220);doc.text(M(sub)+' €',tx+tw-2,y+8,{align:'right'});doc.text(M(ivai)+' €',tx+tw-2,y+16,{align:'right'});
  y+=24;doc.setFillColor(201,168,76);doc.rect(tx,y,tw,10,'F');
  doc.setTextColor(10,12,16);doc.setFontSize(10);doc.setFont('helvetica','bold');doc.text('TOTAL',tx+4,y+7);doc.text(M(f.total)+' €',tx+tw-2,y+7,{align:'right'});
  if(f.obs){y+=14;doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(122,143,168);doc.text('Notas: '+f.obs,MG,y);}
  doc.setFillColor(10,12,16);doc.rect(0,283,W,14,'F');
  doc.setTextColor(61,80,104);doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text(cfg.nombre||'',MG,291);doc.text(cfg.email||'',W/2,291,{align:'center'});doc.text(cfg.tel||'',W-MG,291,{align:'right'});
  return doc;
}
function dlPDF(id){var f=DB.arr('facturas').find(function(x){return x.id===id;});if(!f)return;var doc=buildPDF(id);if(doc)doc.save(f.num+'.pdf');toast('✓ PDF descargado','tok');}
async function dlZipMes(){var facts=DB.arr('facturas').filter(function(f){return f.mes===FAC_MES;});if(!facts.length){toast('Sin facturas este mes','ter');return;}var zip=new JSZip();facts.forEach(function(f){var d=buildPDF(f.id);if(d)zip.file(f.num+'.pdf',d.output('arraybuffer'));});var blob=await zip.generateAsync({type:'blob'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Facturas_'+FAC_MES+'.zip';a.click();toast('✓ ZIP descargado','tok');}
async function dlZipTrim(){var ano=parseInt(document.getElementById('dta')&&document.getElementById('dta').value)||new Date().getFullYear();var tr=parseInt(document.getElementById('dtt')&&document.getElementById('dtt').value)||1;var all=[[ano+'-01',ano+'-02',ano+'-03'],[ano+'-04',ano+'-05',ano+'-06'],[ano+'-07',ano+'-08',ano+'-09'],[ano+'-10',ano+'-11',ano+'-12']];var mm=all[tr-1];var facts=DB.arr('facturas').filter(function(f){return mm.indexOf(f.mes)>-1;});if(!facts.length){toast('Sin facturas este trimestre','ter');return;}closeM();var zip=new JSZip();mm.forEach(function(m){var del=facts.filter(function(f){return f.mes===m;});if(del.length){var c=zip.folder(ML(m));del.forEach(function(f){var d=buildPDF(f.id);if(d)c.file(f.num+'.pdf',d.output('arraybuffer'));});}});var blob=await zip.generateAsync({type:'blob'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Facturas_T'+tr+'_'+ano+'.zip';a.click();toast('✓ ZIP trimestral','tok');}

function exportBackup(){fetch('/api/data').then(function(r){return r.json();}).then(function(data){var blob=new Blob([JSON.stringify({version:2,fecha:new Date().toISOString(),datos:data},null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='medifactura-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('✓ Backup descargado','tok');}).catch(function(e){toast('❌ Error: '+e.message,'ter');});}
function importBackup(input){var file=input.files[0];if(!file)return;if(!confirm('¿Importar backup? Sobreescribirá TODOS los datos actuales.'))return;var reader=new FileReader();reader.onload=function(e){try{var backup=JSON.parse(e.target.result);var datos=backup.datos||backup;var keys=Object.keys(datos);var pending=keys.length;if(!pending){toast('⚠️ Backup vacío','ter');return;}keys.forEach(function(k){fetch('/api/data/'+k,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:datos[k]})}).then(function(){pending--;if(pending===0){DB._cache=datos;toast('✓ Backup restaurado. Recargando...','tok');setTimeout(function(){location.reload();},1500);}}).catch(function(e){toast('❌ Error: '+e.message,'ter');});});}catch(err){toast('❌ Error: '+err.message,'ter');}};reader.readAsText(file);}
function empReset(){if(!confirm('¿Borrar TODOS los datos?'))return;if(!confirm('Confirma: se eliminarán todos los datos.'))return;fetch('/api/data',{method:'DELETE'}).then(function(){DB._cache={};toast('Eliminado. Recargando...','tok');setTimeout(function(){location.reload();},1500);});}

function pgExp(){var suc=DB.arr('sucursales'),cli=DB.arr('clientes'),actos=sortedActos();var so='<option value="">Todas las sucursales</option>'+suc.map(function(s){return '<option value="'+s.id+'">'+s.nombre+'</option>';}).join('');var co='<option value="">Todos los clientes</option>'+cli.map(function(c){return '<option value="'+c.id+'">'+c.nombre+'</option>';}).join('');var ao='<option value="">Todos los actos</option>'+actos.map(function(a){return '<option value="'+a.id+'">'+a.nombre+'</option>';}).join('');return '<div class="hdr"><div><div class="htit">Exportar datos</div><div class="hsub">Filtra y descarga en el formato que necesites</div></div></div><div class="cnt"><div class="csec"><h3>Filtros</h3><div class="fr3"><div class="fg"><label>Mes desde</label><input type="month" id="exm1" value="'+CM()+'"></div><div class="fg"><label>Mes hasta</label><input type="month" id="exm2" value="'+CM()+'"></div><div class="fg"><label>Sucursal</label><select id="exsuc">'+so+'</select></div></div><div class="fr"><div class="fg"><label>Cliente</label><select id="excli">'+co+'</select></div><div class="fg"><label>Acto médico</label><select id="exact">'+ao+'</select></div></div></div><div class="csec"><h3>Descargar</h3><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn bp" onclick="expDo(\'csv\')">↓ CSV</button><button class="btn bp" onclick="expDo(\'pdf\')">↓ PDF resumen</button></div><div style="margin-top:10px;font-size:13px;color:var(--tx2)">CSV incluye: fecha, sucursal, cliente, acto, cantidad, precio, total, notas.</div></div></div>';}
function expGetDias(){var m1=document.getElementById('exm1')&&document.getElementById('exm1').value;var m2=document.getElementById('exm2')&&document.getElementById('exm2').value;var suc=document.getElementById('exsuc')&&document.getElementById('exsuc').value;var cli=document.getElementById('excli')&&document.getElementById('excli').value;var act=document.getElementById('exact')&&document.getElementById('exact').value;return DB.arr('dias').filter(function(d){if(m1&&d.fecha&&d.fecha.slice(0,7)<m1)return false;if(m2&&d.fecha&&d.fecha.slice(0,7)>m2)return false;if(suc&&d.sucursal!==suc)return false;if(cli&&d.cliente!==cli)return false;if(act&&!(d.actos&&d.actos[act]>0))return false;return true;});}
function expDo(tipo){var dias=expGetDias();if(!dias.length){toast('⚠️ Sin datos para los filtros seleccionados','ter');return;}var act=document.getElementById('exact')&&document.getElementById('exact').value;var rows=[];dias.sort(function(a,b){return a.fecha.localeCompare(b.fecha);});dias.forEach(function(d){sortedActos().forEach(function(a){if(act&&a.id!==act)return;var q=d.actos[a.id]||0;if(q>0)rows.push([Dt(d.fecha),NS(d.sucursal),NC(d.cliente),a.nombre,q,a.precio,q*a.precio,d.obs||'']);});});var headers=['Fecha','Sucursal','Cliente','Acto médico','Cantidad','Precio €','Total €','Notas'];if(tipo==='csv'){var csv=[headers.join(';')].concat(rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(';');})).join('\n');var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Actividad.csv';a.click();toast('✓ CSV descargado','tok');}else if(tipo==='pdf'){expPDFResumen(dias);}}
function expPDFResumen(dias){var jsPDF2=window.jspdf&&window.jspdf.jsPDF;if(!jsPDF2){toast('PDF no disponible','ter');return;}var doc=new jsPDF2({unit:'mm',format:'a4'});var cfg=DB.get('cfg')||{};doc.setFontSize(14);doc.setFont('helvetica','bold');doc.text('Resumen de actividad',18,20);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);doc.text(cfg.nombre||'',18,28);var at={};dias.forEach(function(d){Object.keys(d.actos||{}).forEach(function(aid){at[aid]=(at[aid]||0)+(d.actos[aid]||0);});});var body=sortedActos().filter(function(a){return at[a.id]>0;}).map(function(a){return [a.nombre,at[a.id],M(a.precio)+' €',M(at[a.id]*a.precio)+' €'];});var total=dias.reduce(function(s,d){return s+diaTotal(d);},0);body.push(['','','TOTAL',M(total)+' €']);doc.autoTable({startY:36,head:[['Acto médico','Cant.','Precio','Total']],body:body,theme:'grid',headStyles:{fillColor:[20,25,32],textColor:[201,168,76],fontSize:9},bodyStyles:{fontSize:9},columnStyles:{1:{halign:'center'},2:{halign:'right'},3:{halign:'right'}},margin:{left:18,right:18}});doc.save('Resumen_actividad.pdf');toast('✓ PDF descargado','tok');}

function pgAnual(){
  var anio=CY();
  var dias=DB.arr('dias').filter(function(d){return d.fecha&&d.fecha.startsWith(anio+'');});
  var facts=DB.arr('facturas').filter(function(f){return f.mes&&f.mes.startsWith(anio+'');});
  var tAct=dias.reduce(function(s,d){return s+diaTotal(d);},0);
  var tFact=facts.reduce(function(s,f){return s+f.total;},0);
  var tPag=facts.filter(function(f){return f.estado==='pagada';}).reduce(function(s,f){return s+f.total;},0);
  var suc=DB.arr('sucursales'),cli=DB.arr('clientes');
  var so='<option value="">Todas las sucursales</option>'+suc.map(function(s){return '<option value="'+s.id+'">'+s.nombre+'</option>';}).join('');
  var co='<option value="">Todos los clientes</option>'+cli.map(function(c){return '<option value="'+c.id+'">'+c.nombre+'</option>';}).join('');
  var at={};
  dias.forEach(function(d){Object.keys(d.actos||{}).forEach(function(aid){at[aid]=(at[aid]||0)+(d.actos[aid]||0);});});
  var actCards=sortedActos().filter(function(a){return at[a.id]>0;}).map(function(a){return '<div class="scard gold"><div class="slbl">'+a.nombre+'</div><div class="sval gold">'+at[a.id]+'</div><div class="ssub">'+M(at[a.id]*a.precio)+' €</div></div>';}).join('');
  var meses=['01','02','03','04','05','06','07','08','09','10','11','12'];
  var mesRows=meses.map(function(mo){var m=anio+'-'+mo;var mD=dias.filter(function(d){return d.fecha&&d.fecha.startsWith(m);});var mF=facts.filter(function(f){return f.mes===m;});var mA=mD.reduce(function(s,d){return s+diaTotal(d);},0);var mFt=mF.reduce(function(s,f){return s+f.total;},0);if(mA===0&&mFt===0)return '';return '<tr><td>'+ML(m)+'</td><td class="mono">'+M(mA)+' €</td><td class="mono">'+M(mFt)+' €</td><td class="mono">'+mF.length+'</td></tr>';}).join('');
  return '<div class="hdr"><div><div class="htit">Contabilidad anual</div><div class="hsub">Año '+anio+'</div></div></div><div class="cnt"><div class="flt"><select class="fsel" id="ans" onchange="anualFilt()">'+so+'</select><select class="fsel" id="anc" onchange="anualFilt()">'+co+'</select></div><div class="cgrid"><div class="scard"><div class="slbl">Actividad total</div><div class="sval">'+M(tAct)+' €</div><div class="ssub">'+dias.length+' días</div></div><div class="scard green"><div class="slbl">Facturado</div><div class="sval green">'+M(tFact)+' €</div><div class="ssub">'+facts.length+' facturas</div></div><div class="scard"><div class="slbl">Cobrado</div><div class="sval white">'+M(tPag)+' €</div><div class="ssub">Pagadas</div></div></div><div class="stit" style="margin-top:0">Total por acto — '+anio+'</div><div class="cgrid" id="anual-actos">'+( actCards||'<p style="color:var(--tx3);font-size:13px">Sin actividad registrada</p>')+'</div><div class="tw" style="margin-top:16px"><div class="th2"><h3>Resumen mensual</h3></div><table><thead><tr><th>Mes</th><th>Actividad</th><th>Facturado</th><th>Facturas</th></tr></thead><tbody id="anual-meses">'+( mesRows||'<tr><td colspan="4"><div class="emp"><p>Sin datos para '+anio+'</p></div></td></tr>')+'</tbody></table></div></div>';
}

function anualFilt(){
  var s=document.getElementById('ans')&&document.getElementById('ans').value;
  var c=document.getElementById('anc')&&document.getElementById('anc').value;
  var anio=CY();
  var dias=DB.arr('dias').filter(function(d){return d.fecha&&d.fecha.startsWith(anio+'')&&(!s||d.sucursal===s)&&(!c||d.cliente===c);});
  var at={};
  dias.forEach(function(d){Object.keys(d.actos||{}).forEach(function(aid){at[aid]=(at[aid]||0)+(d.actos[aid]||0);});});
  var actCards=sortedActos().filter(function(a){return at[a.id]>0;}).map(function(a){return '<div class="scard gold"><div class="slbl">'+a.nombre+'</div><div class="sval gold">'+at[a.id]+'</div><div class="ssub">'+M(at[a.id]*a.precio)+' €</div></div>';}).join('');
  var el=document.getElementById('anual-actos');
  if(el)el.innerHTML=actCards||'<p style="color:var(--tx3);font-size:13px">Sin actividad para este filtro</p>';
}
